name: Triage automated PRs

# Flags/closes outside pull requests that opted into the "automated agent"
# honeypot lane (the 🤖 marker in the title) and nudges PRs to complete the
# required AI-assistance disclosure.
#
# SECURITY: uses pull_request_target so it can label/comment on fork PRs, but it
# ONLY reads PR metadata (title/body/author) from the event payload — it never
# checks out or executes the PR's code, so untrusted code never runs with this
# token. Do not add a checkout of the PR head to this workflow.
on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const number = pr.number;
            const contributing = `https://github.com/${owner}/${repo}/blob/HEAD/CONTRIBUTING.md`;

            // Policy targets OUTSIDE contributors. Never nag maintainers/org members.
            if (["OWNER", "MEMBER", "COLLABORATOR"].includes(pr.author_association)) {
              core.info(`Skipping internal PR by ${pr.user.login} (${pr.author_association}).`);
              return;
            }

            const title = pr.title || "";
            const body = pr.body || "";
            const labels = [];
            const notes = [];

            // 1) Honeypot: a 🤖 in the title = opted into the "automated agent"
            //    lane. There is no real fast-track; it flags + closes the PR.
            const honeypot = /🤖/u.test(title);  // 🤖
            if (honeypot) {
              labels.push("automated-pr");
              notes.push(
                "🤖 **Automated/agent submission detected and closed.** This PR carries the " +
                "automated-agent marker. There is no fast-track lane — AI-generated and automated " +
                "contributions must be **disclosed and reviewed by a human, never auto-merged**. " +
                "This PR has been closed automatically.\n\n" +
                "If you are a **human** contributor: remove the marker from the title and **reopen** " +
                `the PR. Disclosed, focused, tested AI-assisted contributions are welcome — see [CONTRIBUTING.md](${contributing}).`
              );
            }

            // 2) Disclosure: require the AI-assistance disclosure section.
            if (!/ai assistance disclosure/i.test(body)) {
              labels.push("needs-ai-disclosure");
              notes.push(
                "📝 Please keep and complete the **AI assistance disclosure** section from the pull " +
                `request template. Undisclosed AI-generated contributions are not accepted — see [CONTRIBUTING.md](${contributing}).`
              );
            }

            if (!labels.length && !notes.length) return;

            if (labels.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: number, labels }).catch((e) =>
                core.warning(`addLabels failed: ${e.message}`)
              );
            }

            const marker = "<!-- triage-automated-prs -->";
            const commentBody = `${marker}\n\n${notes.join("\n\n")}`;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: commentBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body: commentBody });
            }

            // Auto-close honeypot PRs (after commenting). Disclosure nudge does not close.
            if (honeypot) {
              await github.rest.pulls.update({ owner, repo, pull_number: number, state: "closed" }).catch((e) =>
                core.warning(`close failed: ${e.message}`)
              );
            }
